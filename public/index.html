<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>模板发布助手</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">
    <header>
      <div class="header-content">
        <h1>模板发布助手</h1>
        <p>填写模板名和版本号，或一次性粘贴多条，点击发布即可。</p>
      </div>
      <div class="header-extra">
        <div class="env-switcher">
          <span class="env-label">环境:</span>
          <div class="env-btn" id="env1Option">测试1</div>
          <div class="env-btn active" id="env2Option">测试2</div>
          <div class="env-btn" id="env3Option">测试3</div>
          <div class="env-btn" id="env4Option">测试4</div>
        </div>
        <span class="extra-text">同一页面可完成单条和批量发布</span>
      </div>
    </header>

    <div class="card">
      <div class="section-title">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
        </svg>
        填写发布信息
      </div>

      <div class="grid">
        <div class="form-group">
          <label>模板名</label>
          <input id="template" placeholder="例如：template-range-xtd" autocomplete="off">
        </div>
        <div class="form-group">
          <label>版本号</label>
          <input id="version" placeholder="例如：v1.54.0-rc.29" autocomplete="off">
        </div>
      </div>

      <div class="form-group">
        <label>批量粘贴 (每行一条，模板名:版本号)</label>
        <textarea id="bulk" placeholder="template-a:v1.0.0&#10;template-b:v2.3.1"></textarea>
        <div class="hint">提示：支持英文冒号分隔粘贴，例如 template-demo:v1.2.3</div>
      </div>

      <div class="actions">
        <button id="submit" class="btn btn-primary"><span class="btn-text">发布镜像</span><span class="spinner" style="display: none;"></span></button>
        <button id="transform" class="btn btn-secondary">格式转换</button>
        <button id="clear" class="btn btn-secondary">清空输入与结果</button>
      </div>
    </div>

    <div class="results-card">
      <div class="section-title">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        发布结果
      </div>
      <div id="resultList" class="result-list">
        <!-- Results will appear here -->
      </div>
    </div>

    <!-- History Toggle (dev mode only) -->
    <div class="history-toggle" id="historyToggle">
      <button class="history-btn" id="historyBtn">📋 查看发布历史</button>
    </div>

    <div class="history-panel" id="historyPanel">
      <div class="history-header">
        <div class="section-title" style="margin-bottom: 0;">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          发布历史记录
        </div>
        <button class="history-btn" id="historyRefresh">刷新</button>
      </div>
      <div id="historyContent">
        <div class="empty-state">加载中...</div>
      </div>
      <div class="history-pagination" id="historyPagination" style="display: none;">
        <button id="historyPrev">上一页</button>
        <span id="historyPageInfo">第 1 页</span>
        <button id="historyNext">下一页</button>
      </div>
    </div>
  </div>

  <script src="app.js" defer></script>
</body>

</html>
